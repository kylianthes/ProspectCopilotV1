<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Prospect Copilot</title>
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        background: #0f1420;
        color: #e8edf5;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      p {
        margin: 0 0 12px;
        color: #8895a7;
        font-size: 12px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: linear-gradient(135deg, #00d4ff 0%, #0094cc 100%);
        color: #0a0e17;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #6b7a99;
        font-size: 12px;
        line-height: 1.4;
      }

      #status.ok {
        color: #00ffa3;
      }

      #status.error {
        color: #ff8ca0;
      }
    </style>
  </head>
  <body>
    <h1>Prospect Copilot</h1>
    <p>Ajoute le profil Instagram ou TikTok visible dans l'application locale.</p>
    <button id="addButton" type="button">Ajouter à Prospect Copilot</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
